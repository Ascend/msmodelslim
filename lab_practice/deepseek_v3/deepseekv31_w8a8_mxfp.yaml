apiversion: modelslim_v1

default_w8a8_mxfp: &default_w8a8_mxfp
  weight:
    scope: "per_block"
    dtype: "mxfp8"
    symmetric: True
    method: "minmax"
  act:
    scope: "per_block"
    dtype: "mxfp8"
    symmetric: True
    method: "minmax"

spec:
  process:
    - type: "group"
      configs:
      - type: "linear_quant"
        qconfig: *default_w8a8_mxfp
        include:
          - "*mlp*"
          - "*self_attn*"
        exclude:
          - "*self_attn.kv_b_proj*"
  save:
    - type: "ascendv1_saver"
      part_file_size: 4