apiversion: multimodal_vlm_modelslim_v1
metadata:
  config_id: qwen3_vl_embedding_w8a8
  score: 90
  verified_tags:
    Qwen3-VL-Embedding-2B:
      - - vLLM_Ascend
        - Atlas_A2_Inference
      - - vLLM_Ascend
        - Atlas_300I_Duo
    Qwen3-VL-Embedding-8B:
      - - vLLM_Ascend
        - Atlas_A2_Inference
      - - vLLM_Ascend
        - Atlas_300I_Duo
    Qwen3-VL-Reranker-2B:
      - - vLLM_Ascend
        - Atlas_A2_Inference
      - - vLLM_Ascend
        - Atlas_300I_Duo
    Qwen3-VL-Reranker-8B:
      - - vLLM_Ascend
        - Atlas_A2_Inference
      - - vLLM_Ascend
        - Atlas_300I_Duo
  label:
    w_bit: 8
    a_bit: 8
    is_sparse: False
    kv_cache: False

default_w8a8_dynamic: &default_w8a8_dynamic
  act:
    scope: "per_token"
    dtype: "int8"
    symmetric: True
    method: "minmax"
  weight:
    scope: "per_channel"
    dtype: "int8"
    symmetric: True
    method: "minmax"

spec:
  process:
    - type: "iter_smooth"
      alpha: 0.9  # 浮点数, > 0, 默认 0.9，平衡参数，控制激活和权重的相对重要性。
      scale_min: 1e-5  # 浮点数, > 0, 默认 1e-5，缩放因子的下界，防止数值过小导致数值不稳定。
      symmetric: True  # 使用is_shift=True时，应该将symmetric设置为False
      enable_subgraph_type:
        - 'norm-linear'
        - 'linear-linear'
        - 'ov'
        - 'up-down'
      include:
        - "*"
    - type: "linear_quant"
      qconfig: *default_w8a8_dynamic
      include:
        - "*"
      exclude:
        - "model.language_model.layers.*.mlp.down_proj"
        - "model.language_model.layers.*.mlp.up_proj"
        - "model.language_model.layers.*.mlp.gate_proj"
        - "*linear_fc2"
        - "*merger*"
        - "model.visual.blocks.*.attn.proj*"
        - "model.visual.blocks.*.attn.qkv*"
        - "model.visual.blocks.*.mlp*"
        - "model.visual.blocks.*.norm1*"
        - "model.visual.blocks.*.norm2*"
  save:
    - type: "ascendv1_saver"
      part_file_size: 4  # 单位 GB；0 表示不分文件
  dataset: "calibImages"  # Short name: auto-searches in lab_calib/
  default_text: "Describe this image in detail."
